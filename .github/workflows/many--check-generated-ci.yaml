name: Check generated CI
# all workflow files that end in `.nix.yml` are generated by nix. If someone
# updates the nix files the CI is not updated automatically. This checks if
# they are up to date.

on:
  pull_request:
    branches: [main, master, release, development]
    types: [opened, synchronize, reopened]
    paths: [ ci/**, hosts/**, homes/** ]
  push:
    branches: [main, master, release, development]
    paths: [ ci/**, hosts/**, homes/** ]

jobs:
  check-generated-ci:
    name: Check generated CI for being up to date
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.3.0
      - name: Install Nix
        uses: cachix/install-nix-action@v31.7.0
      - name: Store old CI in new directory
        run: |
          mkdir -p old
          shopt -s dotglob
          mv .github/workflows/*.nix.yml old/
          shopt -u dotglob
      - name: Build workflow files
        run: nix run '.#update-ci'
      - name: Store new CI in new directory
        run: |
          mkdir -p new
          shopt -s dotglob
          mv .github/workflows/*.nix.yml new/
          shopt -u dotglob
      - name: Compare old and new CI for changes
        run: diff --recursive --unified old new
